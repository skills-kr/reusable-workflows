name: Step 3

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  actions: write
  issues: write

env:
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v6
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v4
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: 호출자 워크플로우에서 github-pages 작업 확인
        id: check-deploy-pages-call
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .github/workflows/ci.yml
          keyphrase: 'uses:\s*\.\/\.github\/workflows\/deploy-pages\.yml'

      - name: GrantBirki/comment 액션 사용 확인
        id: check-comment-action
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .github/workflows/ci.yml
          keyphrase: 'uses:\s*GrantBirki\/comment@v2\.1\.1'

      - name: 최소 3개의 permissions 블록 확인
        id: check-permissions-block-count
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .github/workflows/ci.yml
          keyphrase: "permissions"
          minimum-occurrences: 3

      - name: workflow_run 결론 확인
        id: check-workflow-run-success-condition
        continue-on-error: true
        shell: bash
        run: |
          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "STEP_MESSAGE=Verified that CI workflow concluded with success." >> "$GITHUB_OUTPUT"
          else
            echo "STEP_MESSAGE=Your CI workflow run has failed." >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: 댓글 업데이트 - 단계 결과
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "Checked that your CI workflow calls deploy-pages.yml"
                passed: ${{ steps.check-deploy-pages-call.outcome == 'success' }}
              - description: "Checked that your CI workflow uses GrantBirki/comment"
                passed: ${{ steps.check-comment-action.outcome == 'success' }}
              - description: "Checked that your CI workflow defines at least three permissions blocks"
                passed: ${{ steps.check-permissions-block-count.outcome == 'success' }}
              - description: ${{ steps.check-workflow-run-success-condition.outputs.STEP_MESSAGE }}
                passed: ${{ steps.check-workflow-run-success-condition.outcome == 'success' }}

      # END: Check practical exercise

      - name: 모든 검사가 통과하지 않으면 실패
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_review_content:
    name: 리뷰 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v6
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 완료 - 최종 리뷰
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/lesson-review.md

      - name: 댓글 생성 - 리뷰 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: 현재 워크플로우 비활성화
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 완료 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "end",
              "step": 3,
              "description": "배포 및 PR 피드백",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true

  finish_exercise:
    name: 실습 완료
    needs: [find_exercise, post_review_content]
    uses: skills-kr/exercise-toolkit/.github/workflows/finish-exercise.yml@kr-v0.6.0
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "재사용 가능한 워크플로우 만들기"
