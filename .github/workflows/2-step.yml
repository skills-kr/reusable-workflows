name: Step 2

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v6
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v4
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: ci.yml 워크플로우 파일 존재 확인
        id: check-ci-file-exists
        continue-on-error: true
        uses: skills-kr/exercise-toolkit/actions/file-exists@kr-v0.6.0
        with:
          file: .github/workflows/ci.yml

      - name: ci.yml에서 재사용 가능한 워크플로우 호출 확인
        id: check-workflow-call
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .github/workflows/ci.yml
          keyphrase: 'uses:\s*\.\/\.github\/workflows\/reusable-node-quality\.yml'
          case-sensitive: true

      - name: actionlint로 ci.yml 검사
        id: check-actionlint
        continue-on-error: true
        uses: raven-actions/actionlint@v2.1.1
        with:
          files: .github/workflows/ci.yml
          version: 1.7.10
          fail-on-error: true

      - name: 워크플로우 이름이 정확히 CI인지 확인
        id: check-workflow-name
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .github/workflows/ci.yml
          keyphrase: '^name:\s*CI'
          case-sensitive: true

      - name: 댓글 업데이트 - 단계 결과
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Confirmed .github/workflows/ci.yml exists"
                passed: ${{ steps.check-ci-file-exists.outcome == 'success' }}
              - description: "Confirmed ci.yml calls the reusable node quality workflow"
                passed: ${{ steps.check-workflow-call.outcome == 'success' }}
              - description: "Confirmed ci.yml passes actionlint syntax checks"
                passed: ${{ steps.check-actionlint.outcome == 'success' }}
              - description: "Confirmed workflow name is exactly CI"
                passed: ${{ steps.check-workflow-name.outcome == 'success' }}

      # Add more checks as needed

      # END: Check practical exercise

      - name: 모든 검사가 통과하지 않으면 실패
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v6
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 완료
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: 댓글 생성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: 댓글 생성 - 진행 상황 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: CI 워크플로우 완료 대기
        # Step 3을 활성화하기 전에 CI 워크플로우가 완료될 때까지 기다려야 합니다.
        # Step 3은 `workflow_run: CI completed`로 트리거됩니다. CI가 아직 실행 중일 때
        # Step 3을 활성화하면, 완료 이벤트가 Step 3을 조기에 트리거합니다
        # (학습자가 Step 3 작업을 완료하기 전에).
        uses: skills-kr/exercise-toolkit/actions/wait-for-workflow@kr-v0.6.0
        with:
          workflow-id: ci.yml
          status: completed
          head-sha: ${{ github.event.pull_request.head.sha }}
          polling-interval: 10
          timeout: 180
          fail-on-timeout: false

      - name: 현재 워크플로우 비활성화 및 다음 워크플로우 활성화
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 2,
              "description": "재사용 워크플로우 호출",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
